```html
<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Lớp 12A5 - Countdown THPTQG</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>

body{
font-family:'Quicksand',sans-serif;
background:#0f172a;
color:white;
}

.nav-btn{
font-weight:800;
font-size:13px;
letter-spacing:1px;
}

.countbox{
font-size:56px;
font-weight:900;
letter-spacing:2px;
}

.student-card:hover{
transform:scale(1.05);
}

</style>
</head>


<body>

<!-- HEADER -->

<header class="bg-black border-b border-yellow-500 p-4 sticky top-0 z-50">

<div class="max-w-6xl mx-auto flex justify-between items-center">

<h1 class="text-yellow-400 font-black text-xl cursor-pointer"
onclick="showSection('home')">
🎓 LỚP 12A5
</h1>

<div class="flex gap-6 nav-btn">

<button onclick="showSection('home')">Trang chủ</button>
<button onclick="showSection('students')">Học sinh</button>
<button onclick="showSection('gallery')">Kỷ niệm</button>

</div>

</div>
</header>



<!-- HOME -->

<section id="section-home"
class="min-h-screen flex flex-col justify-center items-center text-center">

<div class="text-7xl mb-6">🎓</div>

<h1 class="text-4xl md:text-6xl font-black text-yellow-400 mb-6">
KỲ THI THPT QUỐC GIA 2026
</h1>

<p class="text-gray-300 mb-6">
Thời gian còn lại
</p>

<div class="bg-black/40 border border-yellow-500 rounded-3xl px-10 py-8 shadow-2xl">

<div id="countdown" class="countbox text-yellow-400">
...
</div>

<p class="text-gray-400 mt-4">
Ngày thi: <b>11 / 06 / 2026</b>
</p>

</div>

<div class="mt-10 max-w-xl text-gray-300 italic">
"Mỗi ngày cố gắng một chút — ngày thi bạn sẽ cảm ơn chính mình."
</div>

</section>



<!-- STUDENTS -->

<section id="section-students" class="hidden p-10 max-w-6xl mx-auto">

<h2 class="text-2xl font-black text-yellow-400 mb-6">
Danh sách học sinh
</h2>

<div id="studentList"
class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
</div>

</section>



<!-- GALLERY -->

<section id="section-gallery" class="hidden p-10 max-w-6xl mx-auto">

<h2 class="text-2xl font-black text-yellow-400 mb-10">
Hành trình 3 năm
</h2>

<div class="grid md:grid-cols-3 gap-6">

<img src="class10.jpg" class="rounded-xl cursor-pointer hover:scale-105 transition">

<img src="class11.jpg" class="rounded-xl cursor-pointer hover:scale-105 transition">

<img src="class12.jpg" class="rounded-xl cursor-pointer hover:scale-105 transition">

</div>

</section>



<!-- STUDENT MODAL -->

<div id="studentModal"
class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50">

<div class="bg-zinc-900 p-6 rounded-xl border border-yellow-500 w-80 text-center">

<img id="modalAvatar"
class="w-28 h-28 rounded-full mx-auto border-4 border-yellow-500 mb-4">

<h3 id="modalName" class="text-yellow-400 text-xl font-bold"></h3>

<p id="modalDesc" class="text-gray-300 mt-3"></p>

<button onclick="closeModal()"
class="mt-6 bg-yellow-500 text-black px-4 py-2 rounded">
Đóng
</button>

</div>

</div>



<footer class="text-center text-gray-400 p-6 border-t border-yellow-500 mt-10">
© 2026 - Lớp 12A5 THPT Rạch Kiến
</footer>



<script>

/* ===== FIREBASE ===== */

const firebaseConfig = {

apiKey: "AIzaSyC8DW3w2ZbhZ8tnAA6ZJ-BQ69JMu0yVtzQ",
authDomain: "dsclass12a5.firebaseapp.com",
projectId: "dsclass12a5",
storageBucket: "dsclass12a5.firebasestorage.app",
messagingSenderId: "542384706583",
appId: "1:542384706583:web:10b1e914b5479cc93fb852"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();



/* ===== COUNTDOWN ===== */

function updateCountdown(){

const examDate = new Date("June 11, 2026 00:00:00").getTime();

const now = new Date().getTime();

const distance = examDate - now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
const seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
days+" ngày "+hours+" giờ "+minutes+" phút "+seconds+"s";

}

setInterval(updateCountdown,1000);



/* ===== NAVIGATION ===== */

function showSection(name){

const sections=["home","students","gallery"];

sections.forEach(s=>{

const el=document.getElementById("section-"+s);

if(s===name){

el.classList.remove("hidden");

if(name==="students") loadStudents();

}else{

el.classList.add("hidden");

}

});

}



/* ===== LOAD STUDENTS ===== */

function loadStudents(){

const container=document.getElementById("studentList");

container.innerHTML="Đang tải...";

db.collection("students").get().then((snapshot)=>{

container.innerHTML="";

snapshot.forEach(doc=>{

const student=doc.data();

const card=document.createElement("div");

card.className="student-card bg-zinc-800 p-4 rounded-xl text-center cursor-pointer transition";

card.innerHTML=`

<img src="${student.avatar || 'default-avatar.png'}"
class="w-24 h-24 mx-auto rounded-full border-4 border-yellow-500 mb-3">

<h3 class="text-yellow-400 font-bold">${student.name}</h3>

`;

card.onclick=()=>openModal(student);

container.appendChild(card);

});

});

}



/* ===== STUDENT MODAL ===== */

function openModal(student){

document.getElementById("modalAvatar").src=student.avatar||"default-avatar.png";

document.getElementById("modalName").innerText=student.name;

document.getElementById("modalDesc").innerText=
student.description || "Thành viên lớp 12A5";

document.getElementById("studentModal").classList.remove("hidden");

}

function closeModal(){

document.getElementById("studentModal").classList.add("hidden");

}

</script>

</body>
</html>
